# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: sageflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z postgres 5432; do sleep 1; done
              echo "Waiting for Redis..."
              until nc -z redis 6379; do sleep 1; done
              echo "Waiting for Qdrant..."
              until nc -z qdrant 6333; do sleep 1; done
              echo "All dependencies ready!"
      containers:
        - name: backend
          image: sageflow-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: sageflow-config
            - secretRef:
                name: sageflow-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql://sageflow:$(DB_PASSWORD)@postgres:5432/sageflow"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-pvc
---
# Uploads PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
  namespace: sageflow
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi
---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: sageflow
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
