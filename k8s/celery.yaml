# Celery Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: sageflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z postgres 5432; do sleep 1; done
              echo "Waiting for Redis..."
              until nc -z redis 6379; do sleep 1; done
              echo "All dependencies ready!"
      containers:
        - name: celery
          image: sageflow-backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - app.workers.celery_app
            - worker
            - --loglevel=info
            - --concurrency=2
          envFrom:
            - configMapRef:
                name: sageflow-config
            - secretRef:
                name: sageflow-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql://sageflow:$(DB_PASSWORD)@postgres:5432/sageflow"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-pvc
