# SageFlow Secrets
apiVersion: v1
kind: Secret
metadata:
  name: sageflow-secrets
  namespace: sageflow
type: Opaque
stringData:
  # 数据库密码 (生产环境使用强密码)
  DB_PASSWORD: "your-secure-db-password"

  # JWT 密钥 (生产环境使用强密钥，至少32字符)
  JWT_SECRET: "your-secure-jwt-secret-key-at-least-32-characters"

  # JWT 算法
  JWT_ALGORITHM: "HS256"
---
# PostgreSQL Secrets
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: sageflow
type: Opaque
stringData:
  POSTGRES_DB: "sageflow"
  POSTGRES_USER: "sageflow"
  POSTGRES_PASSWORD: "your-secure-db-password"
